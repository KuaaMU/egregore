<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egregore</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{--bg:#0a0a0a;--surface:#141414;--surface2:#1a1a1a;--border:#262626;--text:#e5e5e5;--dim:#737373;--accent:#8b5cf6;--accent-dim:#7c3aed;--green:#22c55e;--red:#ef4444;--user-bg:#1e1b4b;--user-border:#312e81;--code-bg:#1e1e1e;--code-border:#333;--shadow:0 8px 32px rgba(0,0,0,.5)}
[data-theme="light"]{--bg:#fafafa;--surface:#fff;--surface2:#f5f5f5;--border:#e5e5e5;--text:#171717;--dim:#737373;--accent:#7c3aed;--accent-dim:#6d28d9;--green:#16a34a;--red:#dc2626;--user-bg:#ede9fe;--user-border:#c4b5fd;--code-bg:#f4f4f5;--code-border:#e4e4e7;--shadow:0 8px 32px rgba(0,0,0,.12)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex}
a{color:var(--accent);text-decoration:none}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

.sidebar{width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--surface)}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-header h1{font-size:16px;font-weight:600}
.icon-btn{background:none;border:1px solid var(--border);color:var(--dim);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{color:var(--text);border-color:var(--dim)}
.new-btn{padding:8px;margin:12px 16px;width:calc(100% - 32px);background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:13px}
.new-btn:hover{border-color:var(--accent)}
.topic-list{flex:1;overflow-y:auto;padding:8px}
.topic-item{padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:2px}
.topic-item:hover{background:var(--bg)}
.topic-item.active{background:var(--bg);border:1px solid var(--border)}
.topic-title{font-size:13px;font-weight:500}
.topic-meta{font-size:11px;color:var(--dim);margin-top:2px}

.main{flex:1;display:flex;flex-direction:column;min-width:0}
.main-header{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
.main-header h2{font-size:15px;font-weight:600}
.header-actions{display:flex;gap:6px}
.chat-area{flex:1;overflow-y:auto;padding:24px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-state p{font-size:14px}

.message{margin-bottom:16px;max-width:80%}
.message.user{margin-left:auto}
.message-bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6}
.message.user .message-bubble{background:var(--user-bg);border:1px solid var(--user-border);border-radius:12px 12px 4px 12px}

.md-content{font-size:14px;line-height:1.7}
.md-content p{margin-bottom:8px}.md-content p:last-child{margin-bottom:0}
.md-content h1,.md-content h2,.md-content h3{margin:16px 0 8px;font-weight:600}
.md-content h1{font-size:18px}.md-content h2{font-size:16px}.md-content h3{font-size:14px}
.md-content ul,.md-content ol{margin:8px 0;padding-left:20px}
.md-content li{margin-bottom:4px}
.md-content code{background:var(--code-bg);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono','Consolas',monospace}
.md-content pre{background:var(--code-bg);border:1px solid var(--code-border);border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto}
.md-content pre code{background:none;padding:0}
.md-content blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--dim);margin:8px 0}
.md-content table{border-collapse:collapse;width:100%;margin:8px 0}
.md-content th,.md-content td{border:1px solid var(--border);padding:6px 10px;text-align:left;font-size:13px}
.md-content th{background:var(--surface2);font-weight:600}
.md-content img{max-width:100%;border-radius:8px;margin:8px 0}

.provider-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:16px}
.provider-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
.provider-card:hover{border-color:var(--dim)}
.card-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.card-header:hover{background:var(--bg)}
.provider-name{font-size:13px;font-weight:600;color:var(--accent)}
.card-meta{display:flex;gap:6px;align-items:center}
.badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500}
.badge-ok{background:rgba(34,197,94,.15);color:var(--green)}
.badge-fail{background:rgba(239,68,68,.15);color:var(--red)}
.badge-time{background:rgba(128,128,128,.1);color:var(--dim)}
.badge-streaming{background:rgba(139,92,246,.15);color:var(--accent)}
.chevron{transition:transform .2s;font-size:11px;color:var(--dim)}
.provider-card.expanded .chevron{transform:rotate(90deg)}
.card-summary{padding:0 14px 12px;font-size:13px;color:var(--dim);line-height:1.5;max-height:48px;overflow:hidden;cursor:pointer}
.card-full{display:none;padding:0 14px 14px}
.card-actions{display:flex;gap:4px;margin-bottom:10px}
.card-actions .icon-btn{width:26px;height:26px;font-size:12px}
.provider-card.expanded .card-summary{display:none}
.provider-card.expanded .card-full{display:block}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:40px}
.modal-overlay.show{display:flex}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:800px;width:100%;max-height:85vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
.modal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-body{flex:1;overflow-y:auto;padding:20px}

.loading-bubble{display:flex;align-items:center;gap:8px;padding:12px 16px;margin-bottom:16px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--dim)}

.conn-status{font-size:11px;padding:2px 8px;border-radius:8px}
.conn-ok{background:rgba(34,197,94,.15);color:var(--green)}
.conn-off{background:rgba(239,68,68,.15);color:var(--red)}

.input-area{padding:12px 24px;border-top:1px solid var(--border);background:var(--surface)}
.input-row{display:flex;gap:8px}
.input-row input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:14px;outline:none}
.input-row input:focus{border-color:var(--accent)}
.input-row button{padding:10px 20px;background:var(--accent);color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500}
.input-row button:hover{background:var(--accent-dim)}
.input-row button:disabled{opacity:.5;cursor:not-allowed}

.create-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:200}
.create-overlay.show{display:flex}
.create-modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:400px;box-shadow:var(--shadow)}
.create-modal h3{font-size:16px;margin-bottom:16px}
.create-modal input{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:14px;margin-bottom:12px;outline:none}
.create-modal input:focus{border-color:var(--accent)}
.create-modal label{font-size:13px;color:var(--dim);margin-bottom:6px;display:block}
.checkbox-group{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.checkbox-group label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
.create-actions{display:flex;gap:8px;justify-content:flex-end}
.create-actions button{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px}
.btn-cancel{background:var(--bg);border:1px solid var(--border);color:var(--dim)}
.btn-create{background:var(--accent);border:none;color:white}

.toast{position:fixed;bottom:24px;right:24px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);z-index:300;display:none;box-shadow:var(--shadow)}
.toast.show{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>⬡ Egregore</h1>
    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" id="themeBtn">🌙</button>
  </div>
  <button class="new-btn" onclick="showCreate()">+ New Topic</button>
  <div class="topic-list" id="topicList"></div>
  <div style="padding:12px 16px;border-top:1px solid var(--border)">
    <span class="conn-status conn-ok" id="connStatus">● Connected</span>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <h2 id="mainTitle">Select a topic</h2>
    <div class="header-actions" id="headerActions" style="display:none">
      <button class="icon-btn" onclick="reopenTopic()" title="Reopen">↩</button>
      <button class="icon-btn" onclick="closeTopic()" title="Close">◻</button>
      <button class="icon-btn" onclick="deleteTopic()" title="Delete" style="color:var(--red)">✕</button>
    </div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state"><div class="icon">⬡</div><p>Create a topic to get started</p></div>
  </div>
  <div class="input-area" id="inputArea" style="display:none">
    <div class="input-row">
      <input type="text" id="promptInput" placeholder="Ask all providers..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendPrompt()">
      <button onclick="sendPrompt()" id="sendBtn">↑</button>
    </div>
  </div>
</div>

<!-- Full-screen modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <div class="modal-header">
      <span class="provider-name" id="modalProvider"></span>
      <div style="display:flex;gap:6px">
        <button class="icon-btn" onclick="copyModalContent()" title="Copy">📋</button>
        <button class="icon-btn" onclick="closeModal()" title="Close">✕</button>
      </div>
    </div>
    <div class="modal-body md-content" id="modalBody"></div>
  </div>
</div>

<!-- Create modal -->
<div class="create-overlay" id="createOverlay">
  <div class="create-modal">
    <h3>New Topic</h3>
    <input type="text" id="newTitle" placeholder="Topic title..." onkeydown="if(event.key==='Enter')createTopic()">
    <label>Providers</label>
    <div class="checkbox-group">
      <label><input type="checkbox" value="chatgpt" checked> ChatGPT</label>
      <label><input type="checkbox" value="grok" checked> Grok</label>
      <label><input type="checkbox" value="kimi"> Kimi</label>
      <label><input type="checkbox" value="qwen"> Qwen</label>
      <label><input type="checkbox" value="doubao"> Doubao</label>
    </div>
    <div class="create-actions">
      <button class="btn-cancel" onclick="hideCreate()">Cancel</button>
      <button class="btn-create" onclick="createTopic()">Create</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
marked.setOptions({breaks:true,gfm:true});
function renderMd(s){return marked.parse(s||'')}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

let currentTopic=null, topics=[], modalRawText='', turnCounter=0;

// Theme
function toggleTheme(){const h=document.documentElement,c=h.getAttribute('data-theme'),n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);document.getElementById('themeBtn').textContent=n==='dark'?'🌙':'☀️';localStorage.setItem('theme',n)}
(()=>{const s=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',s);document.getElementById('themeBtn').textContent=s==='dark'?'🌙':'☀️'})();

// Connection
async function checkConn(){try{await fetch('/api/topics',{signal:AbortSignal.timeout(3000)});document.getElementById('connStatus').className='conn-status conn-ok';document.getElementById('connStatus').textContent='● Connected'}catch{document.getElementById('connStatus').className='conn-status conn-off';document.getElementById('connStatus').textContent='● Disconnected'}}
setInterval(checkConn,10000);

// Toast
function showToast(msg,ms=2000){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),ms)}

// API
async function api(path,opts={}){const r=await fetch(path,{headers:{'Content-Type':'application/json'},...opts,body:opts.body?JSON.stringify(opts.body):undefined});if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}

// Topics
async function loadTopics(){try{topics=await api('/api/topics')}catch{return}
document.getElementById('topicList').innerHTML=topics.map(t=>`<div class="topic-item ${currentTopic?.id===t.id?'active':''}" onclick="selectTopic('${t.id}')"><div class="topic-title">${esc(t.title)}</div><div class="topic-meta">${t.providers.join(', ')}</div></div>`).join('')}

async function selectTopic(id){currentTopic=topics.find(t=>t.id===id);if(!currentTopic)return;document.getElementById('mainTitle').textContent=currentTopic.title;document.getElementById('headerActions').style.display='flex';document.getElementById('inputArea').style.display='block';await loadResponses(id);loadTopics()}

async function loadResponses(id){let r;try{r=await api(`/api/topics/${id}/responses`)}catch{return}
const a=document.getElementById('chatArea');if(!r.length){a.innerHTML='<div class="empty-state"><p>No responses yet. Send a prompt.</p></div>';return}
turnCounter=0;let html='';for(const set of r){turnCounter++;html+=renderTurn(set.prompt,set.responses||{},turnCounter)}a.innerHTML=html;a.scrollTop=a.scrollHeight}

// Render a single turn
function renderTurn(prompt,responses,turn){
const providers=Object.entries(responses);
return `<div class="message user"><div class="message-bubble">${esc(prompt)}</div></div>
<div class="provider-grid" id="grid-${turn}">${providers.map(([pid,text])=>renderCard(pid,text,true,0,turn)).join('')}</div>`
}

// Render a provider card — unique ID per turn
function renderCard(pid,text,success,latencyMs,turn){
const uid=`${turn}-${pid}`;
const status=success?'<span class="badge badge-ok">✓</span>':'<span class="badge badge-fail">✗</span>';
const latency=latencyMs>0?`<span class="badge badge-time">${latencyMs.toFixed(0)}ms</span>`:'';
const summary=success?esc((text||'').substring(0,120))+'...':'Error';
const html=success?renderMd(text):'<p style="color:var(--red)">Request failed</p>';
return `<div class="provider-card" id="card-${uid}">
<div class="card-header" onclick="toggleCard('${uid}')"><span class="provider-name">${esc(pid)}</span><div class="card-meta">${status}${latency}<span class="chevron">▸</span></div></div>
<div class="card-summary" onclick="toggleCard('${uid}')">${summary}</div>
<div class="card-full"><div class="card-actions">
<button class="icon-btn" onclick="event.stopPropagation();copyCard('${uid}')" title="Copy">📋</button>
<button class="icon-btn" onclick="event.stopPropagation();openModal('${uid}')" title="Expand">⛶</button>
</div><div class="md-content">${html}</div></div></div>`}

function toggleCard(uid){document.getElementById(`card-${uid}`)?.classList.toggle('expanded')}
function copyCard(uid){const c=document.getElementById(`card-${uid}`);if(!c)return;const m=c.querySelector('.md-content');if(m)navigator.clipboard.writeText(m.textContent||'').then(()=>showToast('Copied'))}

// Modal
function openModal(uid){const c=document.getElementById(`card-${uid}`);if(!c)return;const m=c.querySelector('.md-content');document.getElementById('modalProvider').textContent=uid.split('-').slice(1).join('-');document.getElementById('modalBody').innerHTML=m?m.innerHTML:'';modalRawText=m?m.textContent:'';document.getElementById('modalOverlay').classList.add('show')}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}
function copyModalContent(){navigator.clipboard.writeText(modalRawText).then(()=>showToast('Copied'))}

// Send with SSE — show results as they arrive
async function sendPrompt(){
const input=document.getElementById('promptInput'),prompt=input.value.trim();
if(!prompt||!currentTopic)return;
const btn=document.getElementById('sendBtn');btn.disabled=true;btn.textContent='…';input.value='';
turnCounter++;const turn=turnCounter;
const area=document.getElementById('chatArea');

// Show user message + loading grid
area.innerHTML+=`<div class="message user"><div class="message-bubble">${esc(prompt)}</div></div>
<div class="provider-grid" id="grid-${turn}">${currentTopic.providers.map(p=>`<div class="provider-card" id="card-${turn}-${p}"><div class="card-header"><span class="provider-name">${esc(p)}</span><div class="card-meta"><span class="badge badge-streaming">⏳</span></div></div><div class="card-summary"><div class="loading-bubble" style="padding:0"><div class="spinner"></div><span class="loading-text">Waiting...</span></div></div></div>`).join('')}</div>`;
area.scrollTop=area.scrollHeight;

try{
const resp=await fetch(`/api/topics/${currentTopic.id}/send`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt})});
const reader=resp.body.getReader();const decoder=new TextDecoder();let buffer='';

while(true){
const{done,value}=await reader.read();if(done)break;
buffer+=decoder.decode(value,{stream:true});
const lines=buffer.split('\n');buffer=lines.pop()||'';
for(const line of lines){
if(!line.startsWith('data: '))continue;
const data=line.slice(6);
if(data==='[DONE]')continue;
try{
const r=JSON.parse(data);
const uid=`${turn}-${r.provider}`;
const card=document.getElementById(`card-${uid}`);
if(card){
const status=r.success?'<span class="badge badge-ok">✓</span>':'<span class="badge badge-fail">✗</span>';
const html=r.success?renderMd(r.content):'<p style="color:var(--red)">Error</p>';
const summary=r.success?esc((r.content||'').substring(0,120))+'...':'Error';
card.innerHTML=`<div class="card-header" onclick="toggleCard('${uid}')"><span class="provider-name">${esc(r.provider)}</span><div class="card-meta">${status}<span class="chevron">▸</span></div></div>
<div class="card-summary" onclick="toggleCard('${uid}')">${summary}</div>
<div class="card-full"><div class="card-actions">
<button class="icon-btn" onclick="event.stopPropagation();copyCard('${uid}')" title="Copy">📋</button>
<button class="icon-btn" onclick="event.stopPropagation();openModal('${uid}')" title="Expand">⛶</button>
</div><div class="md-content">${html}</div></div>`;
area.scrollTop=area.scrollHeight;
}}catch{}}}
}catch(e){
showToast('Error: '+e.message,3000);
}finally{btn.disabled=false;btn.textContent='↑'}
}

// Actions
function showCreate(){document.getElementById('createOverlay').classList.add('show');document.getElementById('newTitle').focus()}
function hideCreate(){document.getElementById('createOverlay').classList.remove('show')}
async function createTopic(){const t=document.getElementById('newTitle').value.trim();if(!t)return;const p=[...document.querySelectorAll('.checkbox-group input:checked')].map(c=>c.value);if(!p.length)return;await api('/api/topics',{method:'POST',body:{title:t,providers:p}});document.getElementById('newTitle').value='';hideCreate();await loadTopics();showToast('Created')}
async function closeTopic(){if(!currentTopic)return;await api(`/api/topics/${currentTopic.id}/close`,{method:'POST'});showToast('Closed')}
async function reopenTopic(){if(!currentTopic)return;await api(`/api/topics/${currentTopic.id}/reopen`,{method:'POST'});showToast('Reopened')}
async function deleteTopic(){if(!currentTopic)return;if(!confirm(`Delete "${currentTopic.title}"?`))return;await api(`/api/topics/${currentTopic.id}`,{method:'DELETE'});currentTopic=null;document.getElementById('mainTitle').textContent='Select a topic';document.getElementById('headerActions').style.display='none';document.getElementById('inputArea').style.display='none';document.getElementById('chatArea').innerHTML='<div class="empty-state"><div class="icon">⬡</div><p>Create a topic to get started</p></div>';await loadTopics();showToast('Deleted')}

loadTopics();
</script>
</body>
</html>
