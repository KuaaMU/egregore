<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egregore</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #141414; --border: #262626;
  --text: #e5e5e5; --dim: #737373; --accent: #8b5cf6;
  --green: #22c55e; --red: #ef4444; --yellow: #eab308;
  --user-bg: #1e1b4b; --provider-bg: #141414;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }

/* Sidebar */
.sidebar { width: 260px; border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-header h1 { font-size: 18px; font-weight: 600; }
.sidebar-header p { font-size: 12px; color: var(--dim); margin-top: 4px; }
.new-btn { padding: 8px; margin: 12px 16px; width: calc(100% - 32px); background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; cursor: pointer; font-size: 13px; }
.new-btn:hover { border-color: var(--accent); }
.topic-list { flex: 1; overflow-y: auto; padding: 8px; }
.topic-item { padding: 10px 12px; border-radius: 6px; cursor: pointer; margin-bottom: 2px; }
.topic-item:hover { background: var(--surface); }
.topic-item.active { background: var(--surface); border: 1px solid var(--border); }
.topic-title { font-size: 13px; font-weight: 500; }
.topic-meta { font-size: 11px; color: var(--dim); margin-top: 2px; }

/* Main */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.main-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
.main-header h2 { font-size: 16px; font-weight: 600; }
.header-actions { display: flex; gap: 8px; }
.header-actions button { padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); color: var(--dim); border-radius: 4px; cursor: pointer; font-size: 12px; }
.header-actions button:hover { color: var(--text); border-color: var(--dim); }
.header-actions button.danger:hover { color: var(--red); border-color: var(--red); }

/* Chat area */
.chat-area { flex: 1; overflow-y: auto; padding: 24px; }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--dim); }
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { font-size: 14px; }

/* Messages */
.message { margin-bottom: 16px; max-width: 85%; }
.message.user { margin-left: auto; }
.message-bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.message.user .message-bubble { background: var(--user-bg); border: 1px solid #312e81; border-radius: 12px 12px 4px 12px; }
.message.provider .message-bubble { background: var(--provider-bg); border: 1px solid var(--border); border-radius: 12px 12px 12px 4px; }
.message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.provider-tag { font-size: 12px; font-weight: 600; color: var(--accent); }
.badge { font-size: 10px; padding: 2px 6px; border-radius: 8px; }
.badge-ok { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-fail { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-time { background: rgba(255,255,255,0.05); color: var(--dim); }

/* Provider grid */
.provider-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
@media (max-width: 800px) { .provider-grid { grid-template-columns: 1fr; } }
.provider-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color 0.2s; }
.provider-card:hover { border-color: var(--dim); }
.provider-card-header { padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
.provider-card-body { padding: 0 14px 12px; font-size: 13px; color: var(--dim); line-height: 1.5; max-height: 60px; overflow: hidden; }
.provider-card-full { display: none; padding: 0 14px 14px; font-size: 13px; line-height: 1.6; border-top: 1px solid var(--border); margin-top: 8px; padding-top: 12px; white-space: pre-wrap; }
.provider-card.expanded .provider-card-full { display: block; }
.provider-card.expanded .provider-card-body { display: none; }
.chevron { transition: transform 0.2s; font-size: 11px; color: var(--dim); }
.provider-card.expanded .chevron { transform: rotate(90deg); }

/* Loading */
.loading-bubble { display: flex; align-items: center; gap: 8px; padding: 12px 16px; }
.spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--dim); }

/* Images */
.response-images { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
.response-images img { max-width: 200px; max-height: 200px; border-radius: 8px; border: 1px solid var(--border); }

/* Input */
.input-area { padding: 16px 24px; border-top: 1px solid var(--border); }
.input-row { display: flex; gap: 8px; }
.input-row input { flex: 1; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-size: 14px; outline: none; }
.input-row input:focus { border-color: var(--accent); }
.input-row button { padding: 10px 20px; background: var(--accent); color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; }
.input-row button:hover { opacity: 0.9; }
.input-row button:disabled { opacity: 0.5; cursor: not-allowed; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 100; }
.modal-overlay.show { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 400px; }
.modal h3 { font-size: 16px; margin-bottom: 16px; }
.modal input { width: 100%; padding: 10px 14px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 6px; font-size: 14px; margin-bottom: 12px; outline: none; }
.modal input:focus { border-color: var(--accent); }
.modal label { font-size: 13px; color: var(--dim); margin-bottom: 6px; display: block; }
.checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
.checkbox-group label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
.modal-actions button { padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.btn-cancel { background: var(--surface); border: 1px solid var(--border); color: var(--dim); }
.btn-create { background: var(--accent); border: none; color: white; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>⬡ Egregore</h1>
    <p>Collective Intelligence</p>
  </div>
  <button class="new-btn" onclick="showCreate()">+ New Topic</button>
  <div class="topic-list" id="topicList"></div>
</div>

<div class="main">
  <div class="main-header">
    <h2 id="mainTitle">Select a topic</h2>
    <div class="header-actions" id="headerActions" style="display:none">
      <button onclick="reopenTopic()">Reopen</button>
      <button onclick="closeTopic()">Close</button>
      <button class="danger" onclick="deleteTopic()">Delete</button>
    </div>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state">
      <div class="icon">⬡</div>
      <p>Create a topic to get started</p>
    </div>
  </div>
  <div class="input-area" id="inputArea" style="display:none">
    <div class="input-row">
      <input type="text" id="promptInput" placeholder="Ask all providers..." onkeydown="if(event.key==='Enter')sendPrompt()">
      <button onclick="sendPrompt()" id="sendBtn">Send</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="createModal">
  <div class="modal">
    <h3>New Topic</h3>
    <input type="text" id="newTitle" placeholder="Topic title..." onkeydown="if(event.key==='Enter')createTopic()">
    <label>Providers</label>
    <div class="checkbox-group">
      <label><input type="checkbox" value="chatgpt" checked> ChatGPT</label>
      <label><input type="checkbox" value="grok" checked> Grok</label>
      <label><input type="checkbox" value="kimi"> Kimi</label>
      <label><input type="checkbox" value="qwen"> Qwen</label>
      <label><input type="checkbox" value="doubao"> Doubao</label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideCreate()">Cancel</button>
      <button class="btn-create" onclick="createTopic()">Create</button>
    </div>
  </div>
</div>

<script>
let currentTopic = null;
let topics = [];

async function api(path, opts = {}) {
  const resp = await fetch(path, {
    headers: {'Content-Type': 'application/json'},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  return resp.json();
}

async function loadTopics() {
  topics = await api('/api/topics');
  const list = document.getElementById('topicList');
  list.innerHTML = topics.map(t =>
    `<div class="topic-item ${currentTopic?.id === t.id ? 'active' : ''}" onclick="selectTopic('${t.id}')">
      <div class="topic-title">${esc(t.title)}</div>
      <div class="topic-meta">${t.providers.join(', ')}</div>
    </div>`
  ).join('');
}

async function selectTopic(id) {
  currentTopic = topics.find(t => t.id === id);
  if (!currentTopic) return;
  document.getElementById('mainTitle').textContent = currentTopic.title;
  document.getElementById('headerActions').style.display = 'flex';
  document.getElementById('inputArea').style.display = 'block';
  await loadResponses(id);
  loadTopics();
}

async function loadResponses(id) {
  const responses = await api(`/api/topics/${id}/responses`);
  const area = document.getElementById('chatArea');

  if (!responses.length) {
    area.innerHTML = '<div class="empty-state"><p>No responses yet. Send a prompt.</p></div>';
    return;
  }

  const latest = responses[responses.length - 1];
  area.innerHTML = renderConversation(latest.prompt, latest.responses || {});
  area.scrollTop = area.scrollHeight;
}

function renderConversation(prompt, responses) {
  const providers = Object.entries(responses);
  return `
    <div class="message user">
      <div class="message-bubble">${esc(prompt)}</div>
    </div>
    <div class="provider-grid">
      ${providers.map(([pid, text]) => renderProviderCard(pid, text, true)).join('')}
    </div>
  `;
}

function renderProviderCard(pid, text, success, latencyMs, images) {
  const latency = latencyMs ? `<span class="badge badge-time">${latencyMs.toFixed(0)}ms</span>` : '';
  const status = success ? '<span class="badge badge-ok">OK</span>' : '<span class="badge badge-fail">FAIL</span>';
  const imgHtml = images?.length ? `<div class="response-images">${images.map(s => `<img src="${esc(s)}" alt="generated">`).join('')}</div>` : '';
  const summary = success ? esc(text.substring(0, 120)) + '...' : 'Error';
  const full = success ? esc(text) : 'Request failed';

  return `
    <div class="provider-card" onclick="this.classList.toggle('expanded')">
      <div class="provider-card-header">
        <span class="provider-tag">${esc(pid)}</span>
        <div style="display:flex;gap:6px;align-items:center">
          ${status}${latency}
          <span class="chevron">▶</span>
        </div>
      </div>
      <div class="provider-card-body">${summary}</div>
      <div class="provider-card-full">${full}${imgHtml}</div>
    </div>
  `;
}

async function sendPrompt() {
  const input = document.getElementById('promptInput');
  const prompt = input.value.trim();
  if (!prompt || !currentTopic) return;

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  input.value = '';

  const area = document.getElementById('chatArea');

  // Show user message + loading
  area.innerHTML += `
    <div class="message user">
      <div class="message-bubble">${esc(prompt)}</div>
    </div>
    <div class="loading-bubble" id="loadingIndicator">
      <div class="spinner"></div>
      <span class="loading-text">Sending to ${currentTopic.providers.length} providers...</span>
    </div>
  `;
  area.scrollTop = area.scrollHeight;

  try {
    const results = await api(`/api/topics/${currentTopic.id}/send`, {method: 'POST', body: {prompt}});

    // Remove loading
    document.getElementById('loadingIndicator')?.remove();

    // Show provider grid
    const grid = document.createElement('div');
    grid.className = 'provider-grid';
    grid.innerHTML = results.map(r =>
      renderProviderCard(r.provider, r.content, r.success, r.latency_ms, r.images)
    ).join('');
    area.appendChild(grid);
    area.scrollTop = area.scrollHeight;

  } catch (e) {
    document.getElementById('loadingIndicator')?.remove();
    area.innerHTML += `<div class="message provider"><div class="message-bubble" style="color:var(--red)">Error: ${esc(e.message)}</div></div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send';
  }
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function showCreate() { document.getElementById('createModal').classList.add('show'); document.getElementById('newTitle').focus(); }
function hideCreate() { document.getElementById('createModal').classList.remove('show'); }

async function createTopic() {
  const title = document.getElementById('newTitle').value.trim();
  if (!title) return;
  const providers = [...document.querySelectorAll('.checkbox-group input:checked')].map(cb => cb.value);
  if (!providers.length) return;
  await api('/api/topics', {method: 'POST', body: {title, providers}});
  document.getElementById('newTitle').value = '';
  hideCreate();
  await loadTopics();
}

async function closeTopic() {
  if (!currentTopic) return;
  await api(`/api/topics/${currentTopic.id}/close`, {method: 'POST'});
}

async function reopenTopic() {
  if (!currentTopic) return;
  await api(`/api/topics/${currentTopic.id}/reopen`, {method: 'POST'});
}

async function deleteTopic() {
  if (!currentTopic) return;
  if (!confirm(`Delete "${currentTopic.title}"?`)) return;
  await api(`/api/topics/${currentTopic.id}`, {method: 'DELETE'});
  currentTopic = null;
  document.getElementById('mainTitle').textContent = 'Select a topic';
  document.getElementById('headerActions').style.display = 'none';
  document.getElementById('inputArea').style.display = 'none';
  document.getElementById('chatArea').innerHTML = '<div class="empty-state"><div class="icon">⬡</div><p>Create a topic to get started</p></div>';
  await loadTopics();
}

loadTopics();
</script>
</body>
</html>
