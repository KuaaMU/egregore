<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Egregore</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root,[data-theme="dark"]{--bg:#0a0a0a;--surface:#141414;--border:#262626;--text:#e5e5e5;--dim:#737373;--accent:#8b5cf6;--green:#22c55e;--red:#ef4444;--user-bg:#1e1b4b;--user-border:#312e81;--code-bg:#1e1e1e;--hover:rgba(255,255,255,.04)}
[data-theme="light"]{--bg:#fafafa;--surface:#fff;--border:#e5e5e5;--text:#171717;--dim:#737373;--accent:#7c3aed;--green:#16a34a;--red:#dc2626;--user-bg:#ede9fe;--user-border:#c4b5fd;--code-bg:#f4f4f5;--hover:rgba(0,0,0,.03)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar{width:260px;border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--surface)}
.sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.sidebar-header h1{font-size:15px;font-weight:600}
.new-btn{padding:8px 12px;margin:10px 12px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;cursor:pointer;font-size:13px}
.new-btn:hover{border-color:var(--accent)}
.topic-list{flex:1;overflow-y:auto;padding:4px 8px}
.topic-item{padding:10px;border-radius:8px;cursor:pointer;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center}
.topic-item:hover{background:var(--hover)}
.topic-item.active{background:var(--bg);border:1px solid var(--border)}
.topic-title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topic-meta{font-size:11px;color:var(--dim);margin-top:2px}
.ib{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px 8px;border-radius:4px;font-size:13px}
.ib:hover{color:var(--text);background:var(--hover)}
.sidebar-footer{padding:10px 12px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.conn-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}
.conn-dot.ok{background:var(--green)}.conn-dot.off{background:var(--red)}
.conn-text{font-size:11px;color:var(--dim)}
.main{flex:1;display:flex;flex-direction:column;min-width:0}
.main-header{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;background:var(--surface)}
.main-header h2{font-size:15px;font-weight:600}
.chat-area{flex:1;overflow-y:auto;padding:24px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--dim)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.3}
.message{margin-bottom:20px;max-width:85%}
.message.user{margin-left:auto}
.message-bubble{padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.6}
.message.user .message-bubble{background:var(--user-bg);border:1px solid var(--user-border);border-radius:16px 16px 4px 16px}
.msg-actions{display:flex;gap:2px;margin-top:6px;opacity:0;transition:opacity .15s}
.message:hover .msg-actions{opacity:1}
.msg-actions button{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px 6px;border-radius:4px;font-size:12px}
.msg-actions button:hover{color:var(--text);background:var(--hover)}
.message.user .msg-actions{justify-content:flex-end}
.md-content{font-size:14px;line-height:1.7}
.md-content p{margin-bottom:8px}.md-content p:last-child{margin-bottom:0}
.md-content h1,.md-content h2,.md-content h3{margin:16px 0 8px;font-weight:600}
.md-content ul,.md-content ol{margin:8px 0;padding-left:20px}
.md-content li{margin-bottom:4px}
.md-content code{background:var(--code-bg);padding:2px 6px;border-radius:4px;font-size:13px;font-family:'SF Mono','Consolas',monospace}
.md-content pre{background:var(--code-bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin:8px 0;overflow-x:auto}
.md-content pre code{background:none;padding:0}
.md-content blockquote{border-left:3px solid var(--accent);padding-left:12px;color:var(--dim);margin:8px 0}
.md-content table{border-collapse:collapse;width:100%;margin:8px 0}
.md-content th,.md-content td{border:1px solid var(--border);padding:6px 10px;text-align:left;font-size:13px}
.md-content th{background:var(--surface);font-weight:600}
.md-content img{max-width:100%;border-radius:8px;margin:8px 0}
.provider-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px;margin-bottom:20px}
.provider-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .15s}
.provider-card:hover{border-color:var(--dim)}
.card-header{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.card-header:hover{background:var(--hover)}
.provider-name{font-size:13px;font-weight:600;color:var(--accent)}
.card-meta{display:flex;gap:6px;align-items:center}
.badge{font-size:10px;padding:2px 6px;border-radius:8px;font-weight:500}
.badge-ok{background:rgba(34,197,94,.15);color:var(--green)}
.badge-fail{background:rgba(239,68,68,.15);color:var(--red)}
.badge-wait{background:rgba(139,92,246,.15);color:var(--accent)}
.chevron{transition:transform .15s;font-size:11px;color:var(--dim)}
.provider-card.expanded .chevron{transform:rotate(90deg)}
.card-summary{padding:0 14px 12px;font-size:13px;color:var(--dim);line-height:1.5;max-height:48px;overflow:hidden;cursor:pointer}
.card-full{display:none;padding:0 14px 14px}
.provider-card.expanded .card-summary{display:none}
.provider-card.expanded .card-full{display:block}
.card-actions{display:flex;gap:2px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.card-actions button{background:none;border:none;color:var(--dim);cursor:pointer;padding:4px 8px;border-radius:4px;font-size:12px}
.card-actions button:hover{color:var(--text);background:var(--hover)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:40px}
.modal-overlay.show{display:flex}
.modal-content{background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:800px;width:100%;max-height:85vh;display:flex;flex-direction:column}
.modal-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.loading-bubble{display:flex;align-items:center;gap:8px;padding:12px 16px}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--dim)}
.input-area{padding:12px 24px 16px;border-top:1px solid var(--border);background:var(--surface)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.input-row input{flex:1;padding:10px 14px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:12px;font-size:14px;outline:none}
.input-row input:focus{border-color:var(--accent)}
.send-btn{width:36px;height:36px;background:var(--accent);color:white;border:none;border-radius:10px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{background:var(--accent)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:200}
.overlay.show{display:flex}
.modal-sm{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:400px}
.modal-sm h3{font-size:16px;margin-bottom:16px}
.modal-sm input[type=text]{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:14px;margin-bottom:12px;outline:none}
.modal-sm input[type=text]:focus{border-color:var(--accent)}
.modal-sm label{font-size:13px;color:var(--dim);margin-bottom:6px;display:block}
.checkbox-group{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.checkbox-group label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions button{padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
.btn-cancel{background:var(--bg);border:1px solid var(--border);color:var(--dim)}
.btn-primary{background:var(--accent);border:none;color:white}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text);z-index:300;display:none}
.toast.show{display:block;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1><span style="color:var(--accent)">⬡</span> Egregore</h1>
    <button class="ib" onclick="toggleTheme()" id="themeBtn">🌙</button>
  </div>
  <button class="new-btn" onclick="showCreate()">+ New Topic</button>
  <div class="topic-list" id="topicList"></div>
  <div class="sidebar-footer">
    <span><span class="conn-dot off" id="connDot"></span><span class="conn-text" id="connText">Checking...</span></span>
    <button class="ib" onclick="showSettings()">⚙</button>
  </div>
</div>

<div class="main">
  <div class="main-header">
    <h2 id="mainTitle">Select a topic</h2>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="empty-state"><div class="icon">⬡</div><p>Create a topic to get started</p></div>
  </div>
  <div class="input-area" id="inputArea" style="display:none">
    <div class="input-row">
      <input type="text" id="promptInput" placeholder="Ask all providers..." onkeydown="if(event.key==='Enter')sendPrompt()">
      <button class="send-btn" onclick="sendPrompt()" id="sendBtn">↑</button>
    </div>
  </div>
</div>

<!-- Full-screen modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-content">
    <div class="modal-header">
      <span style="font-weight:600;font-size:14px" id="modalTitle"></span>
      <div style="display:flex;gap:4px">
        <button class="ib" onclick="copyModalContent()">📋</button>
        <button class="ib" onclick="closeModal()">✕</button>
      </div>
    </div>
    <div class="modal-body md-content" id="modalBody"></div>
  </div>
</div>

<!-- Create modal -->
<div class="overlay" id="createOverlay">
  <div class="modal-sm">
    <h3>New Topic</h3>
    <input type="text" id="newTitle" placeholder="Topic title..." onkeydown="if(event.key==='Enter')createTopic()">
    <label>Providers</label>
    <div class="checkbox-group">
      <label><input type="checkbox" value="chatgpt" checked> ChatGPT</label>
      <label><input type="checkbox" value="grok" checked> Grok</label>
      <label><input type="checkbox" value="kimi"> Kimi</label>
      <label><input type="checkbox" value="qwen"> Qwen</label>
      <label><input type="checkbox" value="doubao"> Doubao</label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideCreate()">Cancel</button>
      <button class="btn-primary" onclick="createTopic()">Create</button>
    </div>
  </div>
</div>

<!-- Settings modal -->
<div class="overlay" id="settingsOverlay" onclick="if(event.target===this)hideSettings()">
  <div class="modal-sm">
    <h3>Settings</h3>
    <div style="padding:10px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:13px;font-weight:500">Default Providers</div>
      <div style="font-size:11px;color:var(--dim);margin-top:2px;margin-bottom:8px">Pre-selected when creating topics</div>
      <div id="settingsProviders" style="display:flex;flex-wrap:wrap;gap:10px"></div>
    </div>
    <div style="margin-top:16px;text-align:right">
      <button class="btn-cancel" onclick="hideSettings()" style="padding:8px 16px;border-radius:8px;cursor:pointer">Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
marked.setOptions({breaks:true, gfm:true});

// Marked CDN fallback
var markedAvailable = typeof marked !== 'undefined';
function renderMd(s) {
  if (!s) return '';
  if (markedAvailable) {
    try { return marked.parse(s); } catch(e) { return esc(s); }
  }
  return esc(s);
}
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

let currentTopic = null;
let topics = [];
let modalRawText = '';
let turnCounter = 0;

// Theme
function toggleTheme() {
  const h = document.documentElement;
  const c = h.getAttribute('data-theme');
  const n = c === 'dark' ? 'light' : 'dark';
  h.setAttribute('data-theme', n);
  document.getElementById('themeBtn').textContent = n === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('theme', n);
}
(function() {
  const s = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', s);
  document.getElementById('themeBtn').textContent = s === 'dark' ? '🌙' : '☀️';
})();

// Connection check
async function checkConn() {
  try {
    await fetch('/api/topics', {signal: AbortSignal.timeout(3000)});
    document.getElementById('connDot').className = 'conn-dot ok';
    document.getElementById('connText').textContent = 'Connected';
  } catch {
    document.getElementById('connDot').className = 'conn-dot off';
    document.getElementById('connText').textContent = 'Disconnected';
  }
}
setInterval(checkConn, 10000);

// Toast
function showToast(msg, ms) {
  ms = ms || 2000;
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, ms);
}

// API
async function api(path, opts) {
  opts = opts || {};
  const r = await fetch(path, {
    headers: {'Content-Type': 'application/json'},
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

// Settings
let appSettings = {};
try { appSettings = JSON.parse(localStorage.getItem('egregore_settings') || '{}'); } catch(e) {}
function getSetting(k, d) { return appSettings[k] !== undefined ? appSettings[k] : d; }
function setSetting(k, v) { appSettings[k] = v; localStorage.setItem('egregore_settings', JSON.stringify(appSettings)); }

function showSettings() {
  var providers = ['chatgpt','grok','kimi','qwen','doubao'];
  var defaults = getSetting('defaultProviders', ['chatgpt','grok']);
  var html = '';
  for (var i = 0; i < providers.length; i++) {
    var p = providers[i];
    var checked = defaults.indexOf(p) >= 0 ? 'checked' : '';
    html += '<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="checkbox" value="' + p + '" ' + checked + ' onchange="updateDefaultProviders()"> ' + p + '</label>';
  }
  document.getElementById('settingsProviders').innerHTML = html;
  document.getElementById('settingsOverlay').classList.add('show');
}

function hideSettings() {
  document.getElementById('settingsOverlay').classList.remove('show');
}

function updateDefaultProviders() {
  var checked = [];
  document.querySelectorAll('#settingsProviders input:checked').forEach(function(c) { checked.push(c.value); });
  setSetting('defaultProviders', checked);
}

// Topics
async function loadTopics() {
  try {
    topics = await api('/api/topics');
  } catch(e) {
    return;
  }
  var html = '';
  for (var i = 0; i < topics.length; i++) {
    var t = topics[i];
    var active = currentTopic && currentTopic.id === t.id ? 'active' : '';
    html += '<div class="topic-item ' + active + '" onclick="selectTopic(\'' + t.id + '\')">';
    html += '<div><div class="topic-title">' + esc(t.title) + '</div>';
    html += '<div class="topic-meta">' + t.providers.join(', ') + '</div></div>';
    html += '<button class="ib" onclick="event.stopPropagation();deleteTopicById(\'' + t.id + '\')" title="Delete">✕</button>';
    html += '</div>';
  }
  document.getElementById('topicList').innerHTML = html;
}

async function selectTopic(id) {
  for (var i = 0; i < topics.length; i++) {
    if (topics[i].id === id) { currentTopic = topics[i]; break; }
  }
  if (!currentTopic) return;
  document.getElementById('mainTitle').textContent = currentTopic.title;
  document.getElementById('inputArea').style.display = 'block';
  await loadResponses(id);
  loadTopics();
}

async function loadResponses(id) {
  var r;
  try { r = await api('/api/topics/' + id + '/responses'); } catch(e) { return; }
  var area = document.getElementById('chatArea');
  if (!r.length) {
    area.innerHTML = '<div class="empty-state"><p>No responses yet. Send a prompt.</p></div>';
    return;
  }
  turnCounter = 0;
  var html = '';
  for (var i = 0; i < r.length; i++) {
    turnCounter++;
    html += renderTurn(r[i].prompt, r[i].responses || {}, turnCounter);
  }
  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;
}

// Topic actions
async function deleteTopicById(id) {
  if (!confirm('Delete this topic?')) return;
  try {
    await api('/api/topics/' + id, {method: 'DELETE'});
    if (currentTopic && currentTopic.id === id) {
      currentTopic = null;
      document.getElementById('mainTitle').textContent = 'Select a topic';
      document.getElementById('inputArea').style.display = 'none';
      document.getElementById('chatArea').innerHTML = '<div class="empty-state"><div class="icon">⬡</div><p>Create a topic to get started</p></div>';
    }
    showToast('Deleted');
    await loadTopics();
  } catch(e) {
    showToast('Error: ' + e.message, 3000);
  }
}

// Render
function renderTurn(prompt, responses, turn) {
  var providers = Object.entries(responses);
  // Store prompt in data attribute (safe from injection)
  var html = '<div class="message user" data-prompt="' + esc(prompt).replace(/"/g, '&quot;') + '">';
  html += '<div class="message-bubble">' + esc(prompt) + '</div>';
  html += '<div class="msg-actions"><button onclick="copyMsg(this)">📋</button>';
  html += '<button onclick="editResendFromEl(this)">✎</button></div></div>';
  html += '<div class="provider-grid">';
  for (var i = 0; i < providers.length; i++) {
    html += renderCard(providers[i][0], providers[i][1], true, 0, turn);
  }
  html += '</div>';
  return html;
}

function editResendFromEl(btn) {
  var msg = btn.closest('.message');
  var prompt = msg.getAttribute('data-prompt') || '';
  editResend(prompt);
}

function getProviderUrl(pid) {
  var urls = {
    chatgpt: 'https://chatgpt.com/',
    grok: 'https://grok.com/',
    kimi: 'https://kimi.moonshot.cn/',
    qwen: 'https://tongyi.aliyun.com/qianwen/',
    doubao: 'https://www.doubao.com/'
  };
  // Use saved conversation URL if available
  if (currentTopic && currentTopic.urls && currentTopic.urls[pid]) {
    return currentTopic.urls[pid];
  }
  return urls[pid] || '#';
}

function renderCard(pid, text, success, latencyMs, turn) {
  var uid = turn + '-' + pid;
  var status = success ? '<span class="badge badge-ok">✓</span>' : '<span class="badge badge-fail">✗</span>';
  var summary = success ? esc((text || '').substring(0, 120)) + '...' : 'Error';
  var html = success ? renderMd(text) : '<p style="color:var(--red)">Request failed</p>';
  var providerUrl = getProviderUrl(pid);
  return '<div class="provider-card" id="card-' + uid + '">'
    + '<div class="card-header" onclick="toggleCard(\'' + uid + '\')">'
    + '<span class="provider-name">' + esc(pid) + '</span>'
    + '<div class="card-meta">' + status + '<span class="chevron">▸</span></div></div>'
    + '<div class="card-summary" onclick="toggleCard(\'' + uid + '\')">' + summary + '</div>'
    + '<div class="card-full"><div class="card-actions">'
    + '<button onclick="event.stopPropagation();copyCard(\'' + uid + '\')">📋 Copy</button>'
    + '<button onclick="event.stopPropagation();openModal(\'' + uid + '\')">⛶ Expand</button>'
    + '<button onclick="event.stopPropagation();window.open(\'' + providerUrl + '\',\'_blank\')">↗ Open</button>'
    + '</div><div class="md-content">' + html + '</div></div></div>';
}

function toggleCard(uid) {
  var el = document.getElementById('card-' + uid);
  if (el) el.classList.toggle('expanded');
}

function copyCard(uid) {
  var c = document.getElementById('card-' + uid);
  if (!c) return;
  var m = c.querySelector('.md-content');
  if (m) navigator.clipboard.writeText(m.textContent || '').then(function() { showToast('Copied'); });
}

function copyMsg(btn) {
  var msg = btn.closest('.message');
  var bubble = msg.querySelector('.message-bubble');
  navigator.clipboard.writeText(bubble.textContent || '').then(function() { showToast('Copied'); });
}

function editResend(text) {
  var input = document.getElementById('promptInput');
  input.value = text;
  input.focus();
  showToast('Edit and press Enter to resend');
}

// Modal
function openModal(uid) {
  var c = document.getElementById('card-' + uid);
  if (!c) return;
  var m = c.querySelector('.md-content');
  var name = uid.split('-').slice(1).join('-');
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalBody').innerHTML = m ? m.innerHTML : '';
  modalRawText = m ? m.textContent : '';
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

function copyModalContent() {
  navigator.clipboard.writeText(modalRawText).then(function() { showToast('Copied'); });
}

// Send
async function sendPrompt() {
  var input = document.getElementById('promptInput');
  var prompt = input.value.trim();
  if (!prompt || !currentTopic) return;

  var btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.textContent = '…';
  input.value = '';
  turnCounter++;
  var turn = turnCounter;
  var area = document.getElementById('chatArea');

  // Show user message
  var userHtml = '<div class="message user"><div class="message-bubble">' + esc(prompt) + '</div>';
  userHtml += '<div class="msg-actions"><button onclick="copyMsg(this)">📋</button>';
  userHtml += '<button onclick="editResend(\'' + esc(prompt).replace(/'/g, "\\'") + '\')">✎</button></div></div>';

  // Show loading cards
  var gridHtml = '<div class="provider-grid">';
  for (var i = 0; i < currentTopic.providers.length; i++) {
    var p = currentTopic.providers[i];
    gridHtml += '<div class="provider-card" id="card-' + turn + '-' + p + '">';
    gridHtml += '<div class="card-header"><span class="provider-name">' + esc(p) + '</span>';
    gridHtml += '<div class="card-meta"><span class="badge badge-wait">⏳</span></div></div>';
    gridHtml += '<div class="card-summary"><div class="loading-bubble" style="padding:0">';
    gridHtml += '<div class="spinner"></div><span class="loading-text">Waiting...</span></div></div></div>';
  }
  gridHtml += '</div>';

  area.innerHTML += userHtml + gridHtml;
  area.scrollTop = area.scrollHeight;

  try {
    var resp = await fetch('/api/topics/' + currentTopic.id + '/send', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: prompt})
    });

    if (!resp.ok) {
      var errBody = await resp.text();
      throw new Error(errBody || 'HTTP ' + resp.status);
    }

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while (true) {
      var result = await reader.read();
      if (result.done) break;
      buffer += decoder.decode(result.value, {stream: true});
      var lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (var j = 0; j < lines.length; j++) {
        var line = lines[j];
        if (!line.startsWith('data: ')) continue;
        var data = line.slice(6);
        if (data === '[DONE]') continue;

        try {
          var r = JSON.parse(data);
          var uid = turn + '-' + r.provider;
          var card = document.getElementById('card-' + uid);
          if (card) {
            var status = r.success ? '<span class="badge badge-ok">✓</span>' : '<span class="badge badge-fail">✗</span>';
            var contentHtml = r.success ? renderMd(r.content) : '<p style="color:var(--red)">Error</p>';
            var summ = r.success ? esc((r.content || '').substring(0, 120)) + '...' : 'Error';
            card.innerHTML = '<div class="card-header" onclick="toggleCard(\'' + uid + '\')">'
              + '<span class="provider-name">' + esc(r.provider) + '</span>'
              + '<div class="card-meta">' + status + '<span class="chevron">▸</span></div></div>'
              + '<div class="card-summary" onclick="toggleCard(\'' + uid + '\')">' + summ + '</div>'
              + '<div class="card-full"><div class="card-actions">'
              + '<button onclick="event.stopPropagation();copyCard(\'' + uid + '\')">📋 Copy</button>'
              + '<button onclick="event.stopPropagation();openModal(\'' + uid + '\')">⛶ Expand</button>'
              + '</div><div class="md-content">' + contentHtml + '</div></div>';
            area.scrollTop = area.scrollHeight;
          }
        } catch(e) { /* ignore parse errors */ }
      }
    }
  } catch(e) {
    showToast('Error: ' + e.message, 3000);
  } finally {
    btn.disabled = false;
    btn.textContent = '↑';
  }
}

// Create
function showCreate() {
  var defaults = getSetting('defaultProviders', ['chatgpt','grok']);
  document.querySelectorAll('.modal-sm .checkbox-group input').forEach(function(cb) {
    cb.checked = defaults.indexOf(cb.value) >= 0;
  });
  document.getElementById('createOverlay').classList.add('show');
  document.getElementById('newTitle').focus();
}

function hideCreate() {
  document.getElementById('createOverlay').classList.remove('show');
}

var creating = false;
async function createTopic() {
  if (creating) return;
  var t = document.getElementById('newTitle').value.trim();
  if (!t) return;
  var p = [];
  document.querySelectorAll('.checkbox-group input:checked').forEach(function(c) { p.push(c.value); });
  if (!p.length) return;
  creating = true;
  try {
    await api('/api/topics', {method: 'POST', body: {title: t, providers: p}});
    document.getElementById('newTitle').value = '';
    hideCreate();
    await loadTopics();
    showToast('Created');
  } catch(e) {
    showToast('Error: ' + e.message, 3000);
  } finally {
    creating = false;
  }
}

// Init
loadTopics();
</script>
</body>
</html>
